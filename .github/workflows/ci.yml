name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check fixture / code separation
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/${BASE_REF}"...HEAD)

          gs_changes=$(echo "$changed" \
            | grep -c "^crates/core/tests/fixtures/google_sheets/.*\.tsv$" || true)
          other_changes=$(echo "$changed" \
            | grep -vc "^crates/core/tests/fixtures/google_sheets/.*\.tsv$" || true)

          if [ "$gs_changes" -gt 0 ] && [ "$other_changes" -gt 0 ]; then
            echo "::error::This PR mixes canonical fixture changes with code changes."
            echo "::error::google_sheets/*.tsv updates and code changes must be separate PRs."
            echo ""
            echo "Canonical fixture files changed in this PR:"
            echo "$changed" | grep "^crates/core/tests/fixtures/google_sheets/.*\.tsv$"
            exit 1
          fi

          if [ "$gs_changes" -gt 0 ]; then
            count=$(echo "$changed" | grep -c "\.tsv$" || true)
            echo "Fixtures-only PR — ${count} canonical TSV file(s) changed, no code changes."
          else
            echo "Code PR — no canonical fixture files changed."
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: |
          cargo nextest run --workspace --profile ci 2>&1 | tee nextest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Write test summary
        if: always()
        run: |
          echo '## Test Results' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat nextest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/nextest/ci/junit.xml
          check_name: truecalc-core tests

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          cargo llvm-cov -p truecalc-core --lcov --output-path lcov.info
          cargo llvm-cov -p truecalc-core --html --output-dir target/coverage-html

      - name: Generate conformance report
        run: cargo test -p truecalc-core --test conformance generate_conformance_report -- --nocapture

      - name: Download main-branch conformance baseline
        run: |
          gh run download \
            --repo "$GITHUB_REPOSITORY" \
            --name conformance-report \
            --dir baseline/ \
            2>/dev/null || echo "No baseline found (first run or main has no artifact)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        continue-on-error: true

      - name: Upload conformance report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: target/conformance-report.json
          retention-days: 30

      - name: Post conformance PR comment
        if: github.event_name == 'pull_request'
        run: |
          bash .github/scripts/post-conformance-comment.sh \
            target/conformance-report.json \
            baseline/conformance-report.json \
            "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Post coverage table as PR comment
        if: github.event_name == 'pull_request'
        run: |
          bash .github/scripts/post-coverage-comment.sh \
            target/nextest/ci/junit.xml \
            target/conformance-report.json \
            "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Publish conformance report to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          total=$(grep '"total"'  target/conformance-report.json | grep -o '[0-9]*' | head -1)
          passed=$(grep '"passed"' target/conformance-report.json | grep -o '[0-9]*' | head -1)
          pct=$(awk "BEGIN { printf \"%.1f\", ($passed/$total)*100 }")
          if   (( $(echo "$pct >= 99.0" | bc -l) )); then color="brightgreen"; hex="#4c1"
          elif (( $(echo "$pct >= 95.0" | bc -l) )); then color="green";       hex="#3c3"
          elif (( $(echo "$pct >= 90.0" | bc -l) )); then color="yellow";      hex="#db1"
          else color="red"; hex="#e05"
          fi
          badge_json="{\"schemaVersion\":1,\"label\":\"Google Sheets Conformance\",\"message\":\"${passed}/${total} · ${pct}%\",\"color\":\"${color}\"}"
          cov_pct=$(python3 -c "import re; c=open('lcov.info').read(); lh=sum(int(m) for m in re.findall(r'^LH:(\d+)',c,re.M)); lf=sum(int(m) for m in re.findall(r'^LF:(\d+)',c,re.M)); print(f'{lh/lf*100:.1f}' if lf else '0.0')")
          if   (( $(echo "$cov_pct >= 80.0" | bc -l) )); then cov_color="brightgreen"
          elif (( $(echo "$cov_pct >= 60.0" | bc -l) )); then cov_color="green"
          elif (( $(echo "$cov_pct >= 40.0" | bc -l) )); then cov_color="yellow"
          else cov_color="red"
          fi
          cov_badge_json="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${cov_pct}%\",\"color\":\"${cov_color}\"}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          cargo build -p truecalc-mcp 2>&1 | tail -1
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"list_functions","arguments":{}}}' \
            | ./target/debug/truecalc-mcp \
            | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); fns=json.loads(d['result']['content'][0]['text'])['functions']; json.dump(sorted(fns,key=lambda f:f['name']),sys.stdout)" \
            > target/functions.json
          python3 .github/scripts/generate-pages-html.py \
            target/nextest/ci/junit.xml \
            target/conformance-report.json \
            "$run_url" "${hex}" "${passed}" "${total}" "${pct}" "${cov_pct}" \
            target/functions.json \
            > /tmp/conformance.html
          cp -r target/coverage-html/html /tmp/coverage-html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          echo "$badge_json" > conformance-badge.json
          echo "$cov_badge_json" > coverage-badge.json
          cp /tmp/conformance.html index.html
          rm -rf coverage && cp -r /tmp/coverage-html coverage
          touch .nojekyll
          git add conformance-badge.json coverage-badge.json index.html .nojekyll coverage/
          git diff --cached --quiet || git commit -m "chore: update conformance + coverage report [skip ci]"
          git push --force origin gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Deny check
        run: cargo deny check

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM
        run: wasm-pack build crates/wasm --target web
